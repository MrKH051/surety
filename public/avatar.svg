<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1a1e"/>
      <stop offset="1" stop-color="#060d0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#34d399" stroke-opacity="0.07" stroke-width="2">
    <path d="M0 128h512M0 256h512M0 384h512M128 0v512M256 0v512M384 0v512"/>
  </g>

  <!-- outer shield -->
  <path d="M256 64 400 118v112c0 84-58 146-144 190-86-44-144-106-144-190V118Z"
        fill="rgba(52,211,153,0.10)" stroke="url(#shield)" stroke-width="22"
        stroke-linejoin="round"/>

  <!-- inner shield line -->
  <path d="M256 118 360 157v76c0 62-42 108-104 142-62-34-104-80-104-142v-76Z"
        fill="none" stroke="url(#shield)" stroke-opacity="0.35" stroke-width="8"
        stroke-linejoin="round"/>

  <!-- check mark -->
  <path d="M192 262 240 310 330 210" fill="none" stroke="url(#shield)"
        stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- coin accent: the USDC refund -->
  <circle cx="366" cy="352" r="54" fill="#0a1a1e" stroke="#f7c948" stroke-width="10"/>
  <text x="366" y="374" font-family="Segoe UI, Arial, sans-serif" font-size="64"
        font-weight="800" fill="#f7c948" text-anchor="middle">$</text>
</svg>
